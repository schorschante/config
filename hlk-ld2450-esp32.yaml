substitutions:
  name: "radar-sensor"
  friendly_name: "HLK-LD2450 Radar"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev  # Anpassen: z.B. esp32dev, wemos_d1_mini32, nodemcu-32s
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s  # Kein Reboot ohne Home Assistant

ota:
  - platform: esphome
    password: !secret ota_password

# Web-UI aktivieren (Port 80)
web_server:
  port: 80
  version: 3

# UART-Verbindung zum HLK-LD2450
# ESP32 UART2: kein Konflikt mit USB/Logger (UART0 bleibt frei)
uart:
  id: uart_ld2450
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 256000
  rx_buffer_size: 2048
  parity: NONE
  stop_bits: 1
  debug:
    direction: RX
    dummy_receiver: true
    after:
      timeout: 100ms
    sequence:
      - lambda: |-
          UARTDebug::log_hex(direction, bytes, ':');
          ESP_LOGD("uart", "Empfangen: %d bytes", bytes.size());

# HLK-LD2450 Komponente
ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

# Sensoren: alle 3 Ziele + Personenanzahl in einem Block
sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 10s
  - platform: template
    name: "Boot Counter"
    id: boot_counter
    accuracy_decimals: 0
    lambda: |-
      static int boots = 0;
      boots++;
      return boots;
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Anzahl erkannter Personen"
    target_1:
      x:
        name: "Person 1 X-Position"
        unit_of_measurement: "mm"
      y:
        name: "Person 1 Y-Position"
        unit_of_measurement: "mm"
      speed:
        name: "Person 1 Geschwindigkeit"
        unit_of_measurement: "mm/s"
      distance:
        name: "Person 1 Entfernung"
        unit_of_measurement: "mm"
        icon: "mdi:ruler"
    target_2:
      x:
        name: "Person 2 X-Position"
        unit_of_measurement: "mm"
      y:
        name: "Person 2 Y-Position"
        unit_of_measurement: "mm"
      speed:
        name: "Person 2 Geschwindigkeit"
        unit_of_measurement: "mm/s"
      distance:
        name: "Person 2 Entfernung"
        unit_of_measurement: "mm"
        icon: "mdi:ruler"
    target_3:
      x:
        name: "Person 3 X-Position"
        unit_of_measurement: "mm"
      y:
        name: "Person 3 Y-Position"
        unit_of_measurement: "mm"
      speed:
        name: "Person 3 Geschwindigkeit"
        unit_of_measurement: "mm/s"
      distance:
        name: "Person 3 Entfernung"
        unit_of_measurement: "mm"
        icon: "mdi:ruler"

# Binärsensor: Anwesenheit erkannt
binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Anwesenheit erkannt"
      icon: "mdi:motion-sensor"

# Switch: Multi-Target-Modus aktivieren
# Einmal einschalten → Sensor speichert das dauerhaft
switch:
  - platform: ld2450
    ld2450_id: ld2450_radar
    multi_target:
      name: "Multi-Target Modus"
      icon: "mdi:account-multiple"

# Text-Sensor
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-Adresse"
  - platform: template
    name: "Letzter Reset-Grund"
    entity_category: diagnostic
    update_interval: 20s
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:  return {"Power-On"};
        case ESP_RST_SW:       return {"Software Reset"};
        case ESP_RST_PANIC:    return {"Panic / Exception"};
        case ESP_RST_INT_WDT:  return {"Interrupt Watchdog"};
        case ESP_RST_TASK_WDT: return {"Task Watchdog"};
        case ESP_RST_WDT:      return {"Watchdog"};
        case ESP_RST_BROWNOUT: return {"Brown-Out (Spannungsabfall)"};
        default:               return {"Sonstiger Reset"};
      }
