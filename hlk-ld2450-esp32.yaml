substitutions:
  name: "radar-sensor"
  friendly_name: "HLK-LD2450 Radar"
  max_distance_mm: "6000"       # Maximale Erkennungsreichweite in mm (6000 = 6m)
  desk_distance_mm: "2000"      # Entfernung für "Person am Schreibtisch" in mm (2000 = 2m)
  desk_timeout: "5min"          # Wie lange niemand erkannt sein muss bis "frei"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  
  ap:
    ssid: "${friendly_name} Fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 3

uart:
  id: uart_ld2450
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 256000
  rx_buffer_size: 2048
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
  
  - platform: ld2450
    ld2450_id: ld2450_radar
    
    target_count:
      name: "Anzahl Personen gesamt"
      id: target_count
      filters:
        - throttle: 500ms  # Throttle hier statt oben
    
    target_1:
      distance:
        name: "Person 1 Entfernung"
        id: dist1
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x1
        internal: true
      y:
        id: tgt_y1
        internal: true

    target_2:
      distance:
        name: "Person 2 Entfernung"
        id: dist2
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x2
        internal: true
      y:
        id: tgt_y2
        internal: true

    target_3:
      distance:
        name: "Person 3 Entfernung"
        id: dist3
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x3
        internal: true
      y:
        id: tgt_y3
        internal: true

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Irgendwer im Raum"
      id: anyone_present

  - platform: template
    name: "Person am Schreibtisch"
    id: desk_occupied
    lambda: |-
      bool someone_close = false;
      int close_count = 0;
      
      if (id(dist1).state > 0 && id(dist1).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      if (id(dist2).state > 0 && id(dist2).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      if (id(dist3).state > 0 && id(dist3).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      
      if (someone_close) {
        ESP_LOGD("desk", "✅ %d Person(en) am Schreibtisch (<2m)", close_count);
      }
      
      return someone_close;
    filters:
      - delayed_off: ${desk_timeout}
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_off: desk_occupied
            then:
              - logger.log:
                  level: WARN
                  format: "⚠️ NIEMAND am Schreibtisch seit 10s! PC könnte suspendiert werden."
                  tag: "pc_control"
            else:
              - logger.log:
                  level: INFO
                  format: "✅ Jemand am Schreibtisch - PC bleibt an"
                  tag: "pc_control"

interval:
  - interval: 30s
    then:
      - lambda: |-
          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
          ESP_LOGI("status", "Raum-Status:");
          ESP_LOGI("status", "  Gesamt im Raum: %.0f Person(en)", id(target_count).state);
          
          if (id(dist1).state > 0) {
            ESP_LOGI("status", "  👤 Person 1: %.0fmm entfernt", id(dist1).state);
          }
          if (id(dist2).state > 0) {
            ESP_LOGI("status", "  👤 Person 2: %.0fmm entfernt", id(dist2).state);
          }
          if (id(dist3).state > 0) {
            ESP_LOGI("status", "  👤 Person 3: %.0fmm entfernt", id(dist3).state);
          }
          
          if (id(desk_occupied).state) {
            ESP_LOGI("status", "  💻 PC-Status: AN (Schreibtisch belegt)");
          } else {
            ESP_LOGW("status", "  💻 PC-Status: SUSPEND (niemand am Schreibtisch)");
          }
          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");

switch:
  - platform: ld2450
    ld2450_id: ld2450_radar
    multi_target:
      name: "Multi-Target Modus"
      icon: "mdi:account-multiple"

# Text-Sensor
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-Adresse"
  - platform: template
    name: "Letzter Reset-Grund"
    entity_category: diagnostic
    update_interval: 20s
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:  return {"Power-On"};
        case ESP_RST_SW:       return {"Software Reset"};
        case ESP_RST_PANIC:    return {"Panic / Exception"};
        case ESP_RST_INT_WDT:  return {"Interrupt Watchdog"};
        case ESP_RST_TASK_WDT: return {"Task Watchdog"};
        case ESP_RST_WDT:      return {"Watchdog"};
        case ESP_RST_BROWNOUT: return {"Brown-Out (Spannungsabfall)"};
        default:               return {"Sonstiger Reset"};
      }
