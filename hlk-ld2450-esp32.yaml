substitutions:
  name: "radar-sensor"
  friendly_name: "HLK-LD2450 Radar"
  max_distance_mm: "6000"       # Maximale Erkennungsreichweite (6000mm = 6m)
  desk_distance_mm: "2000"      # Schreibtisch-Schwelle (2000mm = 2m)
  desk_timeout: "5min"          # Verzögerung bis "frei"
  desk_timeout_s: "300"         # Gleicher Wert in Sekunden (für Berechnungen)

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: none
  
  ap:
    ssid: "${friendly_name} Fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 3

globals:
  - id: no_presence_since_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: suspend_sent
    type: bool
    restore_value: false
    initial_value: 'false'

number:
  - platform: template
    name: "Schreibtisch Entfernung"
    id: desk_distance_num
    icon: "mdi:ruler"
    unit_of_measurement: "mm"
    min_value: 500
    max_value: 6000
    step: 100
    initial_value: ${desk_distance_mm}
    restore_value: true
    optimistic: true

  - platform: template
    name: "PC Suspend Timeout"
    id: suspend_timeout_min
    icon: "mdi:timer-sleep"
    unit_of_measurement: "min"
    min_value: 0
    max_value: 60
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true

# ========== PC IP Adresse ==========
text:
  - platform: template
    name: "PC IP-Adresse"
    id: pc_ip
    icon: "mdi:ip-network"
    initial_value: "192.168.178.110"
    restore_value: true
    optimistic: true
    mode: text
    min_length: 7
    max_length: 15

# ========== HTTP Request ==========
http_request:
  timeout: 3s
  verify_ssl: false
  watchdog_timeout: 15s

uart:
  id: uart_ld2450
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 256000
  rx_buffer_size: 2048
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
  
  - platform: ld2450
    ld2450_id: ld2450_radar
    
    target_count:
      name: "Anzahl Personen gesamt"
      id: target_count
      filters:
        - throttle: 500ms
    
    target_1:
      distance:
        id: dist1_raw
        internal: true
        filters:
          - throttle: 500ms
      x:
        id: x1
        internal: true
      y:
        id: tgt_y1
        internal: true

    target_2:
      distance:
        id: dist2_raw
        internal: true
        filters:
          - throttle: 500ms
      x:
        id: x2
        internal: true
      y:
        id: tgt_y2
        internal: true

    target_3:
      distance:
        id: dist3_raw
        internal: true
        filters:
          - throttle: 500ms
      x:
        id: x3
        internal: true
      y:
        id: tgt_y3
        internal: true

  # Template-Sensoren mit target_count-Gating gegen veraltete Werte
  - platform: template
    name: "Person 1 Entfernung"
    id: dist1
    unit_of_measurement: "mm"
    update_interval: 500ms
    lambda: |-
      float tc = id(target_count).state;
      if (isnan(tc) || tc < 1) return 0.0f;
      float d = id(dist1_raw).state;
      if (isnan(d) || d <= 0 || d > ${max_distance_mm}) return 0.0f;
      return d;

  - platform: template
    name: "Person 2 Entfernung"
    id: dist2
    unit_of_measurement: "mm"
    update_interval: 500ms
    lambda: |-
      float tc = id(target_count).state;
      if (isnan(tc) || tc < 2) return 0.0f;
      float d = id(dist2_raw).state;
      if (isnan(d) || d <= 0 || d > ${max_distance_mm}) return 0.0f;
      return d;

  - platform: template
    name: "Person 3 Entfernung"
    id: dist3
    unit_of_measurement: "mm"
    update_interval: 500ms
    lambda: |-
      float tc = id(target_count).state;
      if (isnan(tc) || tc < 3) return 0.0f;
      float d = id(dist3_raw).state;
      if (isnan(d) || d <= 0 || d > ${max_distance_mm}) return 0.0f;
      return d;

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Irgendwer im Raum"
      id: anyone_present

  # ========== HAUPTLOGIK: PC-Suspend ==========
  - platform: template
    name: "Person am Schreibtisch"
    id: desk_occupied
    lambda: |-
      if (!id(anyone_present).state) return false;

      bool someone_close = false;
      int close_count = 0;

      if (id(dist1).state > 0 && id(dist1).state < id(desk_distance_num).state) {
        someone_close = true;
        close_count++;
      }
      if (id(dist2).state > 0 && id(dist2).state < id(desk_distance_num).state) {
        someone_close = true;
        close_count++;
      }
      if (id(dist3).state > 0 && id(dist3).state < id(desk_distance_num).state) {
        someone_close = true;
        close_count++;
      }
      
      if (someone_close) {
        ESP_LOGD("desk", "✅ %d Person(en) am Schreibtisch (<2m)", close_count);
      }
      
      return someone_close;
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: desk_occupied
            then:
              - logger.log:
                  level: INFO
                  format: "✅ Jemand am Schreibtisch - PC bleibt an"
                  tag: "pc_control"

# ========== Status-Updates alle 30s ==========
interval:
  - interval: 30s
    then:
      - lambda: |-
          int active_count = (id(dist1).state > 0 ? 1 : 0) +
                             (id(dist2).state > 0 ? 1 : 0) +
                             (id(dist3).state > 0 ? 1 : 0);

          bool desk_close = id(desk_occupied).state;

          if (desk_close) {
            id(no_presence_since_ms) = 0;
            id(suspend_sent) = false;
          } else if (id(no_presence_since_ms) == 0) {
            id(no_presence_since_ms) = millis();
          }

          // Suspend auslösen wenn Timeout abgelaufen
          float timeout_min = id(suspend_timeout_min).state;
          if (!id(suspend_sent) && timeout_min > 0 && id(no_presence_since_ms) > 0) {
            uint32_t elapsed_ms = millis() - id(no_presence_since_ms);
            if (elapsed_ms >= (uint32_t)(timeout_min * 60000.0f)) {
              id(suspend_sent) = true;
            }
          }

          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
          ESP_LOGI("status", "Raum-Status:");
          ESP_LOGI("status", "  Gesamt im Raum: %d Person(en)", active_count);

          if (id(dist1).state > 0) {
            ESP_LOGI("status", "  👤 Person 1: %.0fmm entfernt", id(dist1).state);
          }
          if (id(dist2).state > 0) {
            ESP_LOGI("status", "  👤 Person 2: %.0fmm entfernt", id(dist2).state);
          }
          if (id(dist3).state > 0) {
            ESP_LOGI("status", "  👤 Person 3: %.0fmm entfernt", id(dist3).state);
          }

          if (desk_close) {
            ESP_LOGI("status", "  💻 PC-Status: AN (Schreibtisch belegt)");
          } else if (timeout_min <= 0) {
            ESP_LOGI("status", "  💻 PC-Status: AN (Suspend deaktiviert)");
          } else if (id(suspend_sent)) {
            ESP_LOGW("status", "  💻 PC-Status: SUSPEND (Befehl gesendet)");
          } else if (id(no_presence_since_ms) > 0) {
            uint32_t elapsed_s = (millis() - id(no_presence_since_ms)) / 1000;
            uint32_t timeout_s = (uint32_t)(timeout_min * 60.0f);
            uint32_t remaining_s = timeout_s > elapsed_s ? timeout_s - elapsed_s : 0;
            ESP_LOGW("status", "  💻 PC-Status: AN - aber seit %ds niemand erkannt!", elapsed_s);
            ESP_LOGW("status", "  ⏱ PC suspend in %ds (Timeout: %.0fmin)", remaining_s, timeout_min);
          }
          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
      - if:
          condition:
            lambda: 'return id(suspend_sent) && id(no_presence_since_ms) > 0;'
          then:
            - logger.log:
                level: WARN
                format: "⚠️ NIEMAND am Schreibtisch - PC wird suspendiert..."
                tag: "pc_control"
            - delay: 3s
            - http_request.post:
                url: !lambda 'return "http://" + id(pc_ip).state + ":5000/suspend";'
                on_response:
                  then:
                    - logger.log:
                        level: INFO
                        format: "✅ Suspend-Befehl an PC gesendet"
                        tag: "pc_control"
                on_error:
                  then:
                    - logger.log:
                        level: ERROR
                        format: "❌ PC Suspend fehlgeschlagen!"
                        tag: "pc_control"
            - globals.set:
                id: no_presence_since_ms
                value: '0'

# ========== Manuelle Test-Buttons (optional) ==========
button:
  - platform: template
    name: "Test PC Verbindung"
    on_press:
      - logger.log:
          level: INFO
          format: "🔍 Teste Verbindung zum PC..."
      - http_request.get:
          url: !lambda 'return "http://" + id(pc_ip).state + ":5000/status";'
          on_response:
            then:
              - logger.log:
                  level: INFO
                  format: "✅ PC erreichbar!"
          on_error:
            then:
              - logger.log:
                  level: ERROR
                  format: "❌ PC nicht erreichbar!"
  
  - platform: template
    name: "MANUELL: PC Suspend"
    on_press:
      - logger.log:
          level: WARN
          format: "⚠️ Manueller Suspend-Befehl..."
      - http_request.post:
          url: "http://192.168.178.110:5000/suspend"

switch:
  - platform: ld2450
    ld2450_id: ld2450_radar
    multi_target:
      name: "Multi-Target Modus"
      icon: "mdi:account-multiple"

debug:

text_sensor:
  - platform: debug
    reset_reason:
      name: "Letzter Reset-Grund"
      icon: "mdi:restart-alert"
      entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "IP-Adresse"