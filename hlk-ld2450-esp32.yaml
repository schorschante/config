substitutions:
  name: "radar-sensor"
  friendly_name: "HLK-LD2450 Radar"
  max_distance_mm: "6000"       # Maximale Erkennungsreichweite (6000mm = 6m)
  desk_distance_mm: "2000"      # Schreibtisch-Schwelle (2000mm = 2m)
  desk_timeout: "5min"          # Verzögerung bis "frei"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  
  ap:
    ssid: "${friendly_name} Fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 3

# ========== HTTP Request ==========
http_request:
  timeout: 5s
  verify_ssl: false
  watchdog_timeout: 15s

uart:
  id: uart_ld2450
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 256000
  rx_buffer_size: 2048
  parity: NONE
  stop_bits: 1

ld2450:
  id: ld2450_radar
  uart_id: uart_ld2450

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
  
  - platform: ld2450
    ld2450_id: ld2450_radar
    
    target_count:
      name: "Anzahl Personen gesamt"
      id: target_count
      filters:
        - throttle: 500ms
    
    target_1:
      distance:
        name: "Person 1 Entfernung"
        id: dist1
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x1
        internal: true
      y:
        id: tgt_y1
        internal: true
    
    target_2:
      distance:
        name: "Person 2 Entfernung"
        id: dist2
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x2
        internal: true
      y:
        id: tgt_y2
        internal: true
    
    target_3:
      distance:
        name: "Person 3 Entfernung"
        id: dist3
        unit_of_measurement: "mm"
        filters:
          - lambda: |-
              if (x < 0 || x > ${max_distance_mm}) return {};
              return x;
          - throttle: 500ms
      x:
        id: x3
        internal: true
      y:
        id: tgt_y3
        internal: true

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Irgendwer im Raum"
      id: anyone_present

  # ========== HAUPTLOGIK: PC-Suspend ==========
  - platform: template
    name: "Person am Schreibtisch"
    id: desk_occupied
    lambda: |-
      bool someone_close = false;
      int close_count = 0;
      
      if (id(dist1).state > 0 && id(dist1).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      if (id(dist2).state > 0 && id(dist2).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      if (id(dist3).state > 0 && id(dist3).state < ${desk_distance_mm}) {
        someone_close = true;
        close_count++;
      }
      
      if (someone_close) {
        ESP_LOGD("desk", "✅ %d Person(en) am Schreibtisch (<2m)", close_count);
      }
      
      return someone_close;
    filters:
      - delayed_off: ${desk_timeout}
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_off: desk_occupied
            then:
              - logger.log:
                  level: WARN
                  format: "⚠️ NIEMAND am Schreibtisch seit 10s - PC wird suspendiert..."
                  tag: "pc_control"
              - delay: 3s  # Noch 3s Sicherheits-Delay
              - http_request.post:
                  url: "http://192.168.178.72:5000/suspend"
                  on_response:
                    then:
                      - logger.log:
                          level: INFO
                          format: "✅ Suspend-Befehl an PC gesendet"
                          tag: "pc_control"
                  on_error:
                    then:
                      - logger.log:
                          level: ERROR
                          format: "❌ PC Suspend fehlgeschlagen!"
                          tag: "pc_control"
            else:
              - logger.log:
                  level: INFO
                  format: "✅ Jemand am Schreibtisch - PC bleibt an"
                  tag: "pc_control"

# ========== Status-Updates alle 30s ==========
interval:
  - interval: 30s
    then:
      - lambda: |-
          int active_count = (id(dist1).state > 0 ? 1 : 0) +
                             (id(dist2).state > 0 ? 1 : 0) +
                             (id(dist3).state > 0 ? 1 : 0);
          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
          ESP_LOGI("status", "Raum-Status:");
          ESP_LOGI("status", "  Gesamt im Raum: %d Person(en)", active_count);
          
          if (id(dist1).state > 0) {
            ESP_LOGI("status", "  👤 Person 1: %.0fmm entfernt", id(dist1).state);
          }
          if (id(dist2).state > 0) {
            ESP_LOGI("status", "  👤 Person 2: %.0fmm entfernt", id(dist2).state);
          }
          if (id(dist3).state > 0) {
            ESP_LOGI("status", "  👤 Person 3: %.0fmm entfernt", id(dist3).state);
          }
          
          if (id(desk_occupied).state) {
            ESP_LOGI("status", "  💻 PC-Status: AN (Schreibtisch belegt)");
          } else {
            ESP_LOGW("status", "  💻 PC-Status: SUSPEND (niemand am Schreibtisch)");
          }
          ESP_LOGI("status", "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");

# ========== Manuelle Test-Buttons (optional) ==========
button:
  - platform: template
    name: "Test PC Verbindung"
    on_press:
      - logger.log:
          level: INFO
          format: "🔍 Teste Verbindung zum PC..."
      - http_request.get:
          url: "http://192.168.178.72:5000/status"
          on_response:
            then:
              - logger.log:
                  level: INFO
                  format: "✅ PC erreichbar!"
          on_error:
            then:
              - logger.log:
                  level: ERROR
                  format: "❌ PC nicht erreichbar!"
  
  - platform: template
    name: "MANUELL: PC Suspend"
    on_press:
      - logger.log:
          level: WARN
          format: "⚠️ Manueller Suspend-Befehl..."
      - http_request.post:
          url: "http://192.168.178.72:5000/suspend"

switch:
  - platform: ld2450
    ld2450_id: ld2450_radar
    multi_target:
      name: "Multi-Target Modus"
      icon: "mdi:account-multiple"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP-Adresse"