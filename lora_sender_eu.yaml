esphome:
  name: lora-node-1
  friendly_name: LoRa Node 1

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
ota:
 platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# SPI Bus für SX127x
spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

# SX127x im LoRa-Modus
sx127x:
  # DIO0 wird für IRQs genutzt (z.B. RxDone / TxDone)
  dio0_pin: GPIO26

  # SPI Chip Select + Reset
  cs_pin: GPIO18
  rst_pin: GPIO23

  # Optional: PA-Konfiguration (abhängig vom Modul)
  pa_pin: BOOST
  pa_power: 14

  # LoRa-Settings
  modulation: LORA
  frequency: 868.1MHz
  bandwidth: 125_0kHz
  spreading_factor: 7
  coding_rate: CR_4_5
  crc_enable: true
  sync_value: 0x12
  preamble_size: 6

  # Receiver direkt starten
  rx_start: true

  # Wird bei dekodierten Paketen getriggert (LoRa: rssi/snr verfügbar)
  on_packet:
    then:
      - lambda: |-
          char hex[256];
          ESP_LOGD("lora", "packet %s", format_hex_to(hex, x));
          ESP_LOGD("lora", "rssi %.2f dBm", rssi);
          ESP_LOGD("lora", "snr  %.2f dB", snr);

# Test: Packet senden per Button (Packet-Mode ist für send_packet erforderlich)
button:
  - platform: template
    name: "LoRa: Testpaket senden"
    on_press:
      then:
        - sx127x.send_packet:
            data: [0xC5, 0x51, 0x78, 0x82, 0xB7, 0xF9, 0x9C, 0x5C]