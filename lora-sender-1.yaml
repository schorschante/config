esphome:
  name: lora-sender-1
  friendly_name: LoRa Sender 1

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

sx127x:
  dio0_pin: GPIO26
  cs_pin: GPIO18
  rst_pin: GPIO14
  pa_pin: BOOST
  pa_power: 14
  modulation: LORA
  frequency: 868.1MHz
  bandwidth: 125_0kHz
  spreading_factor: 12
  coding_rate: CR_4_8
  crc_enable: true
  sync_value: 0x12
  preamble_size: 8

interval:
  - interval: 120s
    then:
      - sx127x.send_packet:
          data: [0xC5, 0x51, 0x78, 0x82, 0xB7, 0xF9, 0x9C, 0x5C]
      - logger.log: "LoRa Paket gesendet (SF12, 14dBm)"
